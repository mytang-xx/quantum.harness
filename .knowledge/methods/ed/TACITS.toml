# Tacit knowledge for exact diagonalization (ED).
#
# Each entry: signal-understanding-action. `signal` is the surface symptom an
# agent or user observes; `understanding` is the root cause; `action` is the
# concrete fix. Grep `^signal` for a fast index without reading further.
#
# Usage (binding): see AGENTS.md "Tacit knowledge usage". Main agents grep
# this file when uncertain; audit subagents grep it for every method/model
# they audit; debug requests grep it for related methods/models BEFORE
# changing anything.

[[tacit]]
id = "ed-scipy-eigh-segfault-large-N"
method = "ed"
stack = ["numpy+scipy", "quspin"]
signal = "scipy.linalg.eigh segfaults silently on a symmetric matrix with N > ~46341 (D² > 2³¹)"
understanding = """
Pip-installed SciPy on Linux (incl. HPC2 as of scipy 1.17.1) links against
scipy_openblas32 — 32-bit LAPACK integers. Inside dsyevd, internal index
arithmetic on N² indices overflows int32 → SIGSEGV during reduction-to-
tridiagonal. Diagnose via `scipy.show_config("dicts")["Build Dependencies"]["lapack"]["has ilp64"]` returning False.
"""
action = """
Switch to numpy.linalg.eigh. NumPy (pip wheel ≥ 2.0) is built against
scipy_openblas64 (ILP64), same LAPACK driver, 64-bit indices. If a script
already imports scipy.linalg in the same process, isolate the eigh call in
a subprocess (see ed-numpy-scipy-blas-collision).
"""
tags = ["lapack", "openblas32", "ilp64", "large-N", "segfault"]
seen_at = ["results/quantum_scars_turner_2018"]

[[tacit]]
id = "ed-paper-state-selection-proxy"
method = "ed"
signal = "paper asks for a special-band/scar eigenstate but the ED script selects an exact state by nearest energy or nearest FSA eigenvalue"
understanding = """
Nearest-energy matching is a proxy for the paper's state identity. In scar
or other sparse special-state problems, generic eigenstates can lie very
near the target energy. If the paper defines the state by a band, overlap,
sector, parent state, or basis trajectory, energy proximity alone does not
prove that the selected eigenvector is the plotted object. This affects
both overlap panels and derived averages such as PR2 over "special"
eigenstates.
"""
action = """
Before accepting the script or result, encode the paper's state identity
in the protocol and validate it in code: e.g. check membership in the
high-overlap band, overlap with the paper's parent/product state, required
sector, excluded zero-mode status, and any stated basis trajectory. If the
script uses a proxy selector such as nearest energy, nearest approximate
eigenvalue, or highest overlap, record the proxy and write evidence that
the selected exact state satisfies the paper-defined identity; otherwise
the audit finding is proxy/state-mismatch.
"""
tags = ["state-selection", "proxy", "scar-band", "overlap", "PR2", "audit"]
seen_at = ["results/turner_2018_fig3_fig4_l30"]

[[tacit]]
id = "ed-sparse-toarray-segfault-large-D"
method = "ed"
stack = ["numpy+scipy", "quspin"]
signal = "scipy.sparse.csr_matrix.toarray() segfaults on a D×D sparse matrix with D > 46340"
understanding = """
scipy.sparse's `_sparsetools.csr_todense` C extension flattens the output
index as `row * ncols + col` in int32. For an N×N output with N > 46341,
max flat index > 2³¹ → segfault BEFORE LAPACK is called. Fails BEFORE the
sparse data is touched, so the error has no Python traceback.
"""
action = """
Bypass `.toarray()`. Materialize the dense matrix by NumPy fancy-indexing
from the COO view; NumPy promotes flat indices to int64:

    coo = H_sp.tocoo()
    H = np.zeros((D, D), dtype=np.float64)
    H[coo.row.astype(np.int64), coo.col.astype(np.int64)] = coo.data
"""
tags = ["scipy.sparse", "int32-overflow", "large-D", "segfault"]
seen_at = ["results/quantum_scars_turner_2018"]

[[tacit]]
id = "ed-numpy-scipy-blas-collision"
method = "ed"
stack = ["numpy+scipy"]
signal = "np.linalg.eigh segfaults at large N when scipy.linalg has been imported earlier in the same process"
understanding = """
Importing scipy.linalg loads scipy_openblas32 into the process. Calling
numpy.linalg.eigh then loads scipy_openblas64. Both OpenBLAS shared
libraries coexist (LAPACK symbols are suffix-mangled with `_64_` in the
ILP64 build), but OMP thread-pool initialization, signal handlers, and
process-global OpenMP runtime state DO collide. The segfault manifests
in dsyevd even though the matrix is correct and symbol resolution looks
clean.
"""
action = """
Run dense eigh in an isolated subprocess that imports ONLY numpy +
scipy.sparse (NOT scipy.linalg). Parent saves the sparse matrix via
scipy.sparse.save_npz; spawns child via subprocess.run; child loads,
materializes dense, calls np.linalg.eigh, writes eigvals.npy + eigvecs.npy;
parent reads back. Pattern: scripts/eigh_worker.py in the Turner 2018 run.
"""
tags = ["openblas", "blas-collision", "subprocess-isolation", "large-N", "segfault"]
seen_at = ["results/quantum_scars_turner_2018"]

[[tacit]]
id = "ed-openblas64-dsyevd-double-free"
method = "ed"
stack = ["numpy+scipy"]
signal = "`double free or corruption (out)` from glibc inside np.linalg.eigh after ~1.5h of valid compute (SIGABRT, exit -6)"
understanding = """
scipy_openblas64 0.3.31.188.0 has a heap-corruption bug in dsyevd's
divide-and-conquer recursion at large N (N ≳ 60k). The job runs valid
computation for ~1.5h, then glibc aborts. Cause is upstream OpenBLAS —
similar reports exist for dsyevd_64_ at N > ~50k. Not fixable from our
side; the subprocess isolation that fixed ed-numpy-scipy-blas-collision
does NOT prevent this. Even an isolated process hits the same bug.
"""
action = """
Switch stacks for D ≳ 60k:
- Julia LinearAlgebra.eigen (different LAPACK binary; ~15–30 min wall, N=77k, 64 cores)
- GPU cuSOLVER cusolverDnDsyevd on A100/A800 (~5 min wall, N=77k)
- Polynomial-filter Lanczos for spectrum slices + shift-invert Lanczos for special-band eigvecs (avoid dense eigh)
DO NOT retry in pure Python at this scale — bug is reproducible.
"""
tags = ["openblas64", "dsyevd", "heap-corruption", "very-large-N", "abandon-python"]
seen_at = ["results/quantum_scars_turner_2018"]

[[tacit]]
id = "ed-memory-budget-large-D"
method = "ed"
stack = ["numpy+scipy", "quspin"]
signal = "OOM-kill or `Cannot allocate memory` during np.linalg.eigh on D > ~50k symmetric matrix"
understanding = """
Dense eigh peak memory for a D×D real-symmetric matrix:
  input H: D² × 8 bytes
  output eigvecs Z: D² × 8 bytes
  LAPACK dsyevd LWORK ≈ 1 + 6N + 2N² doubles → ~2N² × 8 bytes scratch
Total peak ≈ 4 × D² × 8 bytes. For D = 77,436: ~190 GB RSS, ~240 GB VMS.
Slurm cgroup limits trigger SIGSEGV (not SIGKILL) when VMS approaches the
--mem ceiling, easily mistaken for a code bug.
"""
action = """
Request slurm --mem ≥ 4× the input matrix size, with at least 256 GB
headroom for D ≈ 77k. Use --mem=480G or higher on i64m512u (max 512 GB)
or move to i96m3tu (3 TB). Verify in sacct that MaxVMSize stays well
below ReqMem.
"""
tags = ["memory", "slurm", "dense-eigh", "large-D"]
seen_at = ["results/quantum_scars_turner_2018"]

[[tacit]]
id = "ed-stack-declared-but-not-used"
method = "ed"
stack = ["quspin", "xdiag"]
signal = "manifest declares `stack = \"quspin\"` (or \"xdiag\") but the script's actual imports are raw scipy/numpy"
understanding = """
A common drift: the agent realizes the canonical/fallback stack lacks a
built-in basis or constraint (e.g., PXP no-adjacent constraint absent from
QuSpin's standard basis classes), and silently writes the basis +
Hamiltonian + symmetry block from scratch in scipy. The protocol
declaration becomes a label, not a fact. Audit subagents miss this if
they only check that the route's `check` command succeeds (e.g.,
`python -c 'import quspin'` passes whether or not QuSpin is actually used).
"""
action = """
Either rewrite the script to use the canonical stack with a customization
(QuSpin user_basis + Numba precheck for PXP-style constraints, XDiag
custom representation, ITensors custom site type), OR declare a stack
deviation in [[deviations]] BEFORE compute (route=deviation, stack=actual,
naming why canonical was not viable in concrete terms). Audit step:
mechanically grep the script for the declared stack's import — absence
without a matching deviation is a fail.
"""
tags = ["stack-drift", "audit", "deviation", "provenance"]
seen_at = ["results/quantum_scars_turner_2018"]

[[tacit]]
id = "ed-abandon-python-heuristic"
method = "ed"
signal = "user proposes ED at L large enough that D > 50k (e.g., PXP at L=32 → D₀₊ = 77,436)"
understanding = """
The Python ED stack (scipy + numpy + openblas) has cumulative fragility
above D ≈ 50k. Below that, with the workarounds for tacits 1–4, Python is
fine. Above, the failure modes stack faster than they can be debugged,
and the cost of porting to Julia or GPU is less than the cost of a third
or fourth Python attempt.
"""
action = """
Heuristic table by D:
  D ≤ 10k        → scipy.linalg.eigh, no fuss
  10k–30k        → scipy.linalg.eigh if ILP64; else numpy.linalg.eigh
  30k–46k        → numpy.linalg.eigh, possibly subprocess-isolated
  46k–60k        → subprocess-isolated numpy.linalg.eigh; expect occasional issues; Julia preferred
  > 60k          → DO NOT rely on the Python stack; budget Julia or GPU work upfront

For PXP / Fibonacci chain: L ≤ 30 is comfortable in Python (D₀₊ ≤ 31,836).
L = 32 (D₀₊ = 77,436) is the boundary where Python stops being reliable —
declare a Julia or GPU worker as a dependency, not an emergency fallback.
"""
tags = ["sizing", "stack-selection", "planning"]
seen_at = ["results/quantum_scars_turner_2018"]
