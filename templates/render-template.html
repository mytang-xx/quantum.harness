<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}]});">
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font-family: 'Georgia', serif; max-width: 720px; margin: 40px auto; padding: 0 20px; line-height: 1.7; color: #1a1a1a; }
  h1 { font-size: 1.6em; border-bottom: 2px solid #2563eb; padding-bottom: 8px; }
  h2 { font-size: 1.2em; color: #2563eb; margin-top: 2em; }
  .callout { background: #eff6ff; border-left: 4px solid #2563eb; padding: 12px 16px; margin: 1.5em 0; border-radius: 0 6px 6px 0; }
  .callout-title { font-weight: bold; color: #2563eb; margin-bottom: 4px; }
  .task { background: #f0fdf4; border-left: 4px solid #16a34a; padding: 12px 16px; margin: 1.5em 0; border-radius: 0 6px 6px 0; }
  .task-title { font-weight: bold; color: #16a34a; margin-bottom: 4px; }
  .warning { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 12px 16px; margin: 1.5em 0; border-radius: 0 6px 6px 0; }
  .warning-title { font-weight: bold; color: #f59e0b; margin-bottom: 4px; }
  code { background: #f1f5f9; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
  pre { background: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 6px; overflow-x: auto; }
  pre code { background: none; padding: 0; }
  svg { display: block; margin: 1.5em auto; }
  .caption { text-align: center; color: #64748b; font-size: 0.9em; margin-top: -0.5em; margin-bottom: 1.5em; }
  table { border-collapse: collapse; margin: 1em 0; }
  th, td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: left; }
  th { background: #f8fafc; }
  #content { display: none; }
</style>
</head>
<body>
<div id="content">
{{CONTENT}}
</div>
<div id="rendered"></div>
<script>
  const src = document.getElementById('content').textContent;
  document.getElementById('rendered').innerHTML = marked.parse(src);
</script>
</body>
</html>
