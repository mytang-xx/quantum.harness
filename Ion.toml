[options]
skills-dir = "tools/skills"

[options.targets]
claude = ".claude/skills"

[skills]
# Research workflow
arxiv-search = { source = "yorkeccak/scientific-skills/arxiv-search" }
download-ref = { type = "local" }

# Problem-solving primitives (generic; topic-agnostic)
parameter-scan = { type = "local" }     # multi-axis sweeps (subsumes finite-size-scan)
scaling-fit = { type = "local" }
cross-method-check = { type = "local" }
slurm = { type = "local" }              # cluster mechanism (agent-does-ssh)
setup-julia = { type = "local" }        # Julia install + mirror + project env (local or remote)
reproduce-paper = { type = "local" }    # paper orchestrator (absorbs run-report close)
reproduce-paper-onboard = { type = "local" } # beginner-guided reproduction
report = { type = "local" }             # render single-page interactive HTML report from a reproduction run
scientific-writing = { source = "davila7/claude-code-templates/scientific-writing" }

# Skill tooling
ion-cli = { type = "local" }

# UX
onboard = { type = "local" }
solve = { type = "local" }

# Problem dispatchers (auto-triggered; read cards under .knowledge/{models,physics}/<name>/)
model = { type = "local" }
physics = { type = "local" }

# Superpowers (general-purpose dev workflow: brainstorming, debugging, plans, reviews)
receiving-code-review = { source = "obra/superpowers/skills/receiving-code-review" }
requesting-code-review = { source = "obra/superpowers/skills/requesting-code-review" }
using-git-worktrees = { source = "obra/superpowers/skills/using-git-worktrees" }
brainstorming = { source = "obra/superpowers/skills/brainstorming" }
dispatching-parallel-agents = { source = "obra/superpowers/skills/dispatching-parallel-agents" }
executing-plans = { source = "obra/superpowers/skills/executing-plans" }
finishing-a-development-branch = { source = "obra/superpowers/skills/finishing-a-development-branch" }
subagent-driven-development = { source = "obra/superpowers/skills/subagent-driven-development" }
systematic-debugging = { source = "obra/superpowers/skills/systematic-debugging" }
test-driven-development = { source = "obra/superpowers/skills/test-driven-development" }
using-superpowers = { source = "obra/superpowers/skills/using-superpowers" }
verification-before-completion = { source = "obra/superpowers/skills/verification-before-completion" }
writing-plans = { source = "obra/superpowers/skills/writing-plans" }
writing-skills = { source = "obra/superpowers/skills/writing-skills" }
scientific-visualization = { source = "HughYau/AcademicForge/scientific-visualization" }
