id = "mpskit"
name = "MPSKit.jl + MPSKitModels.jl + TensorKit.jl"
language = "julia"
canonical_for = ["vumps", "idmrg", "infinite-mps", "tdvp"]
default_profile = "cpu"

[profiles.cpu]
label = "CPU"
default = true
install = "cpu"
smoke = "cpu"

[profiles.cpu.requirements]
allocation = "login-or-compute"
mpi = false

[install.cpu]
command = "make install mpskit"
notes = "Adds MPSKit, MPSKitModels, TensorKit into the shared julia-env; remote setup is handled by setup-julia before this command runs."

[smoke.cpu]
where = "login"
command = "julia --project=julia-env -e 'using MPSKit, MPSKitModels, TensorKit'"

[docs]
method = "skills/method-mps/SKILL.md"
official = "https://quantumkithub.github.io/MPSKit.jl/stable/"
