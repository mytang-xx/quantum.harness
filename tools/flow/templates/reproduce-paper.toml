[flow]
id = "reproduce_paper"

[[gates]]
id = "source"

[[gates]]
id = "protocol"
requires = ["source"]

[[gates]]
id = "plan"
requires = ["protocol"]

[[gates]]
id = "script"
requires = ["plan"]

[[gates]]
id = "trusted_check"
requires = ["script"]

[[gates]]
id = "production"
requires = ["trusted_check"]

[[gates]]
id = "assembly"
requires = ["production"]

[[gates]]
id = "close"
requires = ["assembly"]

[[gates]]
id = "report"
requires = ["close"]
