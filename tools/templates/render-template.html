<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root { --bg: #0d1117; --fg: #e6edf3; --accent: #58a6ff; --muted: #8b949e; --card: #161b22; --border: #30363d; --green: #3fb950; --orange: #d29922; --purple: #bc8cff; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
  h2 { font-size: 1.3rem; color: var(--accent); margin-top: 2rem; margin-bottom: 0.8rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
  h3 { font-size: 1.1rem; color: var(--purple); margin-top: 1.2rem; }
  p { margin-bottom: 0.8rem; }
  ul, ol { margin-left: 1.5rem; margin-bottom: 0.8rem; }
  li { margin-bottom: 0.3rem; }
  code { background: var(--card); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
  pre { background: var(--card); padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1rem; }
  pre code { padding: 0; background: none; }
  blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--muted); margin-bottom: 1rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; margin-bottom: 1rem; }
  .endstate { background: linear-gradient(135deg, #1a2332, #162415); border: 1px solid var(--green); border-radius: 8px; padding: 1.5rem; margin: 1.5rem 0; }
  .endstate strong { color: var(--green); }
  .timeline { position: relative; padding-left: 2rem; }
  .timeline::before { content: ''; position: absolute; left: 0.5rem; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .timeline-item { position: relative; margin-bottom: 1.5rem; }
  .timeline-item::before { content: attr(data-step); position: absolute; left: -2rem; width: 1.5rem; height: 1.5rem; background: var(--accent); color: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; line-height: 1.5rem; text-align: center; }
  .effort { display: inline-block; background: var(--card); border: 1px solid var(--border); padding: 0.1rem 0.5rem; border-radius: 12px; font-size: 0.8em; color: var(--orange); }
  .muted { color: var(--muted); }
  hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
</style>
</head>
<body>
{{CONTENT}}
</body>
</html>
