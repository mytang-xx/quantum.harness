# Generic /reproduce-paper protocol template.
#
# This file is paper-agnostic. Claim ids and statements are authored from the
# primary source for the requested reproduction. Flow treats them as opaque
# obligations and only evaluates the declared [[checks]] mechanically.

[artifact]
paper = ""             # arXiv id, DOI, or short paper id (e.g. "arXiv:2305.18541")
title = ""             # paper title; rendered as italicized topbar text
authors = ""           # comma-separated author list; rendered bold in topbar
venue = ""             # journal/year string (e.g. "PRX Quantum 4, 040317 (2023)")
url = ""               # canonical URL for the source (arXiv, DOI, journal page); rendered as topbar link
scope = "full-paper"   # full-paper | main-results | figure-subset | custom
run_id = ""
description = ""

[[sources]]
id = "paper"
kind = "paper"         # paper | supplement | official-code | official-data | kb-card | prior-artifact | analytic-reference
authority = "primary"  # primary | trusted_reference | hint
path = ""
note = ""

# Only paper/supplement/official-code/official-data sources may support primary
# claims. KB hints, scripts, and prior artifacts are cached evidence; they
# require confirmation against a primary source or an explicit assumption.

[[claims]]
id = "claim.example"
statement = "Replace with a primary-source-derived obligation."
scope = "run"          # run | figure | panel | cell | artifact
sources = ["paper"]
assumption = false

# ─── checks ──────────────────────────────────────────────────────────────────
# Six generic kinds. Each names what the check does, never what artifact it
# touches:
#   audit   — an audit-kind attempt with an actor distinct from the producer
#   run     — execute a shell command; exit 0 = pass
#   exists  — declared paths/fields are present
#   agree   — declared field values match across artifacts
#   near    — numeric value within tolerance of a reference
#   fresh   — artifact and declared sources unchanged since `flow artifact add`
# Paper-specific or skill-specific names belong in the data values (paths,
# claims, ids) — never in the `kind` field.
# `claims = [...]` on each check is informational metadata for /report's chip
# resolution; flow itself does not enforce claim coverage.
# `audience = true` opts a check into the rendered HTML's audience-facing
# chip strip; default false keeps internal checks out of the deliverable.

[[checks]]
id = "protocol_audit"
kind = "audit"
gate = "protocol"
audience = true
claims = ["claim.example"]

[[checks]]
id = "script_audit"
kind = "audit"
gate = "script"
audience = true
claims = ["claim.example"]

[[checks]]
id = "production_manifests_complete"
kind = "exists"
gate = "production"
claims = ["claim.example"]
fields = [
  "cells/cell-0001/manifest.json:protocol_hash",
  "cells/cell-0001/manifest.json:script_hash",
  "cells/cell-0001/manifest.json:claims",
]

[[checks]]
id = "manifest_protocol_consensus"
kind = "agree"
gate = "assembly"
claims = ["claim.example"]
against = [
  "cells/cell-0001/manifest.json:protocol_hash",
  "cells/cell-0002/manifest.json:protocol_hash",
]

[[checks]]
id = "artifacts_fresh"
kind = "fresh"
gate = "assembly"
claims = ["claim.example"]
paths = ["figs/fig-example.png"]
against = ["protocol.toml", "scripts/reproduce.jl"]

[[checks]]
id = "trusted_reference_compare"
kind = "near"
gate = "trusted_check"
audience = true
claims = ["claim.example"]

  [[checks.compare]]
  actual = { path = "cells/cell-0001/manifest.json", field = "observable" }
  reference = { path = "references/reference.json", field = "observable_exact" }
  uncertainty = { path = "cells/cell-0001/manifest.json", field = "stderr" }
  tolerance = { abs = 0.0 }

[[checks]]
id = "close_audit"
kind = "audit"
gate = "close"
audience = true
claims = ["claim.example"]

# Close-stage deliverables. /reproduce-paper's close step authors run-report.md
# + consolidated.{jl,py}; one figs/<id>.{png,json} pair per [[figures]] entry.
# Without these `exists` checks, an agent can finish the audit and stop with no
# deliverables on disk (the failure mode that motivated this template).

[[checks]]
id = "close_run_report_exists"
kind = "exists"
gate = "close"
audience = true
claims = ["claim.example"]
paths = ["run-report.md"]

[[checks]]
id = "close_consolidated_exists"
kind = "exists"
gate = "close"
claims = ["claim.example"]
paths = ["consolidated.jl"]   # author replaces with consolidated.py for Python runs

[[checks]]
id = "close_figures_exist"
kind = "exists"
gate = "close"
audience = true
claims = ["claim.example"]
# Author lists every [[figures]] entry's ours_path and data_path here. One
# figure → two entries (PNG + JSON). Keep the list in sync with [[figures]].
paths = ["figs/fig-example.png", "figs/fig-example.json"]

[[checks]]
id = "close_deliverables_fresh"
kind = "fresh"
gate = "close"
claims = ["claim.example"]
paths = ["run-report.md", "consolidated.jl"]
against = ["protocol.toml"]

# Report gate: /report's polish subagent writes editorial.json (registered as
# a flow artifact); the audit subagent traces every editorial sentence to a
# `sourced_by` pointer in the verify reports. The editorial_fresh check pins
# editorial.json to the protocol it was produced against — a post-audit edit
# invalidates the audit chain.

[[checks]]
id = "report_audit"
kind = "audit"
gate = "report"
audience = true
claims = ["claim.example"]

[[checks]]
id = "editorial_fresh"
kind = "fresh"
gate = "report"
claims = ["claim.example"]
paths = ["editorial.json"]
against = ["protocol.toml"]

# Optional: domain-specific validation via a shell command (kind = "run").
# The command should exit 0 on pass, nonzero on fail. Output is captured but
# not interpreted — keep machine semantics in the exit code.
# [[checks]]
# id = "domain_specific"
# kind = "run"
# gate = "script"
# claims = ["claim.example"]
# cmd = "julia --project=julia-env scripts/check_domain.jl"

# ─── deviations ──────────────────────────────────────────────────────────────
# Record deliberate differences from the paper instead of silently treating
# them as equivalent.

[[deviations]]
id = "deviation.example"
statement = ""
reason = ""
claims = []
checks = []

# ─── pending ─────────────────────────────────────────────────────────────────
# Declare next obligations the run does NOT meet (cross-method check, larger
# system size, longer runtime). /report renders one muted chip per [[pending]]
# entry so readers see what's missing without scrolling.

[[pending]]
id = "pending.example"
statement = ""         # e.g. "Independent TTN run at L=128 to confirm c_L magnitude"
reason = ""            # e.g. "TTN backend not yet wired in the harness"

[budgets]
wall_clock = ""
compute = ""
notes = ""

# ─── figures ─────────────────────────────────────────────────────────────────
# Figure pointers consumed by /report. One block per figure. `paper_path` is
# the reference figure (from download-ref's .figures/); `ours_path` is the
# reproduction's plot. `data_path` is optional — when present, /report renders
# an interactive plot from it; when absent, only the static PNG. `claim_ids`
# cross-references the [[claims]] this figure supports.

[[figures]]
id = "<short-id>"              # e.g. "fig4a"
paper_path = ""                # e.g. knowledge-base/literature/<method>/.figures/arxiv__<id>/<extracted-png>
paper_authority = "primary"    # primary | trusted_reference | hint
paper_attribution = ""         # e.g. "Tarabunga et al. 2023, Fig 4(a)"
ours_path = ""                 # e.g. results/<run>/figs/<id>.png
data_path = ""                 # e.g. results/<run>/figs/<id>.json (optional; enables interactive plot)
claim_ids = []

# Optional run-level overrides for /report. Defaults are sane; only set when
# overriding.
# featured_figure = "fig4a"
# central_param = { h = 1.0 }
# [report]
# fonts = "cdn"
