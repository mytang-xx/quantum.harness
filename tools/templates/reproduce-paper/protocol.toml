# Generic /reproduce-paper protocol template.
#
# This file is paper-agnostic. Claim ids and statements are authored from the
# primary source for the requested reproduction.

[artifact]
paper = ""             # arXiv id, DOI, or short paper id (e.g. "arXiv:2305.18541")
title = ""             # paper title; rendered as italicized topbar text
authors = ""           # comma-separated author list; rendered bold in topbar
venue = ""             # journal/year string (e.g. "PRX Quantum 4, 040317 (2023)")
url = ""               # canonical URL for the source (arXiv, DOI, journal page); rendered as topbar link
scope = "full"         # full | main | subset | snapshot | custom
run_id = ""
description = ""

[entry]
run = "scripts/reproduce run"
help = "scripts/reproduce help"
dry = "scripts/reproduce dry"

[[sources]]
id = "paper"
kind = "paper"         # paper | supplement | official-code | official-data | kb-card | prior-artifact | analytic-reference
authority = "primary"  # primary | trusted_reference | hint
path = ""
note = ""

# Only paper/supplement/official-code/official-data sources may support primary
# claims. KB hints, scripts, and prior artifacts are cached evidence; they
# require confirmation against a primary source or an explicit assumption.
# Prefer Markdown source paths for citation. If only a PDF exists, keep the raw
# PDF under sources/ and extract it to Markdown with the download-ref helpers.

[[claims]]
id = "claim.example"
statement = "Replace with a primary-source-derived obligation."
scope = "run"          # run | figure | panel | cell | artifact
sources = ["paper"]
assumption = false
fields = [
  "cells/cell-0001/manifest.json:observable",
  "cells/cell-0001/manifest.json:stderr",
]

# ─── cells ───────────────────────────────────────────────────────────────────
# One block per executable route.

[[cells]]
id = "cell-0001"
claims = ["claim.example"]
figures = ["<short-id>"]
method = ""            # e.g. ed | dmrg | tebd | vmc | qmc | ctmrg | vqe
stack = ""             # selected software stack id or official-code id
route = ""             # paper | canonical | fallback | deviation
source = ""            # primary source, method card, or stack card
check = ""             # route smoke command or official route inspection
state = ""             # passed | failed | skipped
scope = ""             # full | partial | sketch
deviation = ""        # required when route = "deviation"

# Route meanings:
#   paper      — primary source or official code/data specifies the route.
#   canonical  — harness method card plus tools/software/stacks/<stack>.toml.
#   fallback   — next recommended fallback stack in the method card, with source cited.
#   deviation  — any other route; declare a [[deviations]] row before compute.
# `state = "passed"` means the route check actually ran or the official route
# was inspected enough to support the claim. Empty, failed, or skipped states
# block compute unless recorded as a deviation or pending item.

[[figures]]
id = "fig-example"
display_id = "Fig 1"
caption = ""           # caption verbatim from the paper
paper_path = ""        # path to extracted paper figure under .figures/
paper_attribution = ""
